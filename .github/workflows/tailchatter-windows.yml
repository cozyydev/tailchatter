name: Build TailChatter for Windows

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build TailChatter release
        working-directory: tailchatter-egui
        run: cargo build --release

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: tailchatter-windows-x64
          path: tailchatter-egui/target/release/tailchatter.exe